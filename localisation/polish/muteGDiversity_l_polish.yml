### Botanic Traits ###
 trait_mgd_saprotrophic:0 "Saprotrophic"
 trait_mgd_saprotrophic_desc:0 "This species feeds on decaying organic matter, converting waste into nutrients and enriching the soil."
 trait_mgd_saprotrophic_effects:0 "Mineral upkeep per 100 Pops: §R+25§!\n    - Mineral upkeep per devastation on planet: §G-1%§!\n    - counts as a ['trait:trait_mgd_fungoid'] unless ['trait:trait_mgd_plantoid'] or ['trait:trait_mgd_autotrophic']"

 trait_mgd_autotrophic:0 "Autotrophic"
 trait_mgd_autotrophic_desc:0 "This species is capable of producing its own nutrition through photosynthesis or chemosynthesis."
 trait_mgd_autotrophic_effects:0 "Food upkeep on §YWet§! worlds: §G-25%§!\n    - Counts as ['trait:trait_mgd_plantoid'] unless ['trait:trait_mgd_fungoid'] or ['trait:trait_mgd_saprotrophic']"

 trait_mgd_xerophytic:0 "Xerophytic"
 trait_mgd_xerophytic_desc:0 "This botanical species is adapted to living in dry climates."
 trait_mgd_xerophytic_effects:0 "Dry Habitability §G+10%§!\n    - Cold Habitability §R-20%§!\n    - ['trait:trait_mgd_plantoid'] or ['trait:trait_mgd_autotrophic'] effect applies on §YDry§! worlds"

 trait_mgd_cryophytic:0 "Cryophytic"
 trait_mgd_cryophytic_desc:0 "This botanical species is adapted to living in cold climates."
 trait_mgd_cryophytic_effects:0 "Cold Habitability §G+10%§!\n    - Dry Habitability §R-20%§!\n    - ['trait:trait_mgd_plantoid'] or ['trait:trait_mgd_autotrophic'] effect applies on §YCold§! worlds"

 trait_mgd_delicate_sprout:0 "Delicate Sprout"
 trait_mgd_delicate_sprout_desc:0 "This species requires unusually specific conditions to thrive."
 trait_mgd_delicate_sprout_effects:0 "Habitability on non-§Yideal§! worlds: §R-25%§!"

 trait_mgd_thorned:0 "Thorned"
 trait_mgd_thorned_desc:0 "This species developed thorns to deter predators."

 trait_mgd_lignified:0 "Lignified"
 trait_mgd_lignified_desc:0 "Their tissue becomes fibrous and woody with time, granting extra durability."

 trait_mgd_sprawling:0 "Sprawling"
 trait_mgd_sprawling_desc:0 "They extend long vines and creeping branches that can overtake terrain."

 trait_mgd_lush:0 "Lush"
 trait_mgd_lush_desc:0 "§LThis botanic species is especially verdant and can absorb more direct energy from sunlight.§!"

 trait_mgd_blooming:0 "Blooming"
 trait_mgd_blooming_desc:0 "They can only reproduce with the help of pollinators, which they attract with their fragrant flowers."
 trait_mgd_blooming_effects:0 "Pop Growth Speed: §R-1%§! per §HBlooming-Pollinator-Ratio§! (max §R-30%§!)"

 trait_mgd_sporulating:0 "Sporulating"
 trait_mgd_sporulating_desc:0 "They reproduce by releasing vast clouds of spores that drift on wind currents."

### Revenant Traits ###
 trait_mgd_disfigured:0 "Disfigured"
 trait_mgd_disfigured_desc:0 "Their appearance is considered to be shameful and repulsive."
 trait_mgd_disfigured_portrait_override_tt:0 "Requires any Revenant Species."

 trait_mgd_insidious:0 "Insidious"
 trait_mgd_insidious_desc:0 "Members of this species are known to be deceitful and manipulative."
 trait_mgd_insidious_effects:0 "Leaders: §S25% Chance§! to be ['leader_trait:leader_trait_mgd_schemer']"
 trait_mgd_insidious_portrait_override_tt:0 "Requires any Revenant Species."

 trait_mgd_gluttonous:0 "Gluttonous"
 trait_mgd_gluttonous_desc:0 "§LThis species is plagued by a hunger that can never be satisfied.§!"
 trait_mgd_gluttonous_portrait_override_tt:0 "Requires any Revenant Species."

 trait_mgd_abstinent:0 "Abstinent"
 trait_mgd_abstinent_desc:0 "This species practices restraint and moderation, shunning excess and indulgences in all aspects of life."
 trait_mgd_abstinent_portrait_override_tt:0 "Requires any Revenant Species."

 trait_mgd_dysfunctional:0 "Dysfunctional"
 trait_mgd_dysfunctional_desc:0 "Members of this species are prone to spiraling out of control."
 trait_mgd_dysfunctional_effects:0 "$MOD_POP_BONUS_WORKFORCE_MULT$ per negative trait: §R-2.5%§!"
 trait_mgd_dysfunctional_portrait_override_tt:0 "Requires any Revenant Species."

 trait_mgd_ritualists:0 "Ritualists"
 trait_mgd_ritualists_desc:0 "§LMembers of this species are united by their psychological need to honor traditions.§!"
 trait_mgd_ritualists_effects:0 "Unity Production per 100 Pops: §G+1§! per §YAscension Perk§!"
 trait_mgd_ritualists_portrait_override_tt:0 "Requires any Revenant Species."

 trait_mgd_thanatophilic:0 "Thanatophilic"
 trait_mgd_thanatophilic_desc:0 "Memento Mori. This species is innately aware of the fleeting nature of life, feeling a strange attraction towards dead civilizations and ages past."
 trait_mgd_thanatophilic_effects:0 "Pop Happiness on §YTomb§! and §YRelic§! worlds: §G+10%§!\n    - $BONUS_WORKFORCE_FOR$ Researchers on §YTomb§! and §YRelic§! worlds: §G+10%§!"
 trait_mgd_thanatophilic_portrait_override_tt:0 "Requires any Revenant Species."

