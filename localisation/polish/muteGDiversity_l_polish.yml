##############
### Traits ###
##############

### Generic Traits Set ###
 trait_mgd_competitive:0 "Competitive"
 trait_mgd_competitive_desc:0 "This species has a natural drive for competition. Everything is a contest to them, and they strive to win."
 trait_mgd_competitive_effects:0 "$BONUS_WORKFORCE_FOR$ $SPECIALISTS$ per Rival: §G+5%§!"

 trait_mgd_anxious:0 "Anxious"
 trait_mgd_anxious_desc:0 "They are easily affected by stress, and are prone to panic attacks."
 trait_mgd_anxious_effects:0 "$MOD_POP_BONUS_WORKFORCE_MULT$ During War and Crisis: §R-10%§!"

 trait_mgd_territorial:0 "Territorial"
 trait_mgd_territorial_desc:0 "This species is fierce and does not tolerate intruders, happiest when left to themselves with space to spare."
 trait_mgd_territorial_effects:0 "Pop Happiness per 1000 available Housing: §G+0.5%§!\n    - Pop Happiness per closed Border: §G+0.5%§!"

 trait_mgd_carnivorous:0 "Carnivorous"
 trait_mgd_carnivorous_desc:0 "For members of this species, meat is not a preference, it is a need."
 trait_mgd_carnivorous_effects:0 "Pop Growth Speed: §G+30%§! while living on a planet with £job_livestock£ §Y$job_livestock$§! and a local $r_food$ §GProduction Surplus§!\n    - Pop Food Upkeep: §R+50%§! while living on a planet with no £job_livestock£ §Y$job_livestock$§!"


 trait_mgd_militant:0 "Militant"
 trait_mgd_militant_desc:0 "Conflict is viewed as the natural state of affairs, and these people are ever-ready for war."
 trait_mgd_militant_effects:0 "Pop Happiness: §R-10%§! while not at war"

 trait_mgd_peaceful:0 "Peaceful"
 trait_mgd_peaceful_desc:0 "They value harmony above strife, preferring negotiation and stability to the chaos of war."
 trait_mgd_peaceful_effects:0 "Pop Happiness: §R-10%§! while at war"

 trait_mgd_rebellious:0 "Rebellious"
 trait_mgd_rebellious_desc:0 "This species instinctively pushes back against any form of control."

 trait_mgd_patriotic:0 "Patriotic"
 trait_mgd_patriotic_desc:0 "Loyalty to their state runs deep, with individuals willing to sacrifice much for the greater good."

### Planetary Traits Set ### 
 trait_mgd_amphibious:0 "Amphibious"
 trait_mgd_amphibious_desc:0 "Thriving at the edge of land and sea, this species relies on shallow waters as a source of nourishment and protection."
 trait_mgd_amphibious_effects:0 "Pop Growth Speed on §YTropical§! planets: §G+10%§!\n    - Pop Growth Speed on other §Ywet§! planets: §G+5%§!\n    - Pop Growth Speed on §Ynon-wet§! planets: §R-10%§!"

 trait_mgd_climate_flexibility:0 "Climate Flexibility"
 trait_mgd_climate_flexibility_desc:0 "Thanks to the varied continental nature of their homeworld, they have adapted to - and can survive in - many climates; so long as conditions remain somewhat moderate."

 trait_mgd_natural_mariners:0 "Natural Mariners"
 trait_mgd_natural_mariners_desc:0 "Born of the seas, they wield generations of maritime knowledge in exploration, logistics, and naval command."
 trait_mgd_natural_mariners_effects:0 "Unlocks unique leader traits: "

 trait_mgd_surefooted:0 "Sure-footed"
 trait_mgd_surefooted_desc:0 "Built for crags and crevices, this species leaps, climbs, and nests on sheer rock faces with ease. They make full use of the vertical terrain of their homeworld."
 trait_mgd_surefooted_effects:0 "$BONUS_WORKFORCE_FOR$ $WORKERS$ on §YAlpine§! planets: §G+2.5%§!\n    - Pop Housing Usage on §YAlpine§! planets: §G-10%§!"

### Common Traits Set ### 
 trait_mgd_natural_musicians:0 "Natural Musicians"
 trait_mgd_natural_musicians_desc:0 "Members of this species have a natural talent for creating music, be that chirping, singing or playing an instrument."

 trait_mgd_cooperative:0 "Cooperative"
 trait_mgd_cooperative_desc:0 "Individuals see the bigger picture, and solidarily take on tasks to make quick work out of it."
 trait_mgd_cooperative_effects:0 "$BONUS_WORKFORCE_FOR$ $WORKERS$ per 1000 §YCooperative§! $WORKERS$: §G+1%§! (up to §G+10%§!)"

 trait_mgd_stubborn:0 "Stubborn"
 trait_mgd_stubborn_desc:0 "Stoneheaded, difficult to work with and seemingly resistant to admitting, or learning from, their mistakes."

 trait_mgd_resourceful:0 "Resourceful"
 trait_mgd_resourceful_desc:0 "This species can make the most of the resources available to them."

 trait_mgd_environmentalists:0 "Environmentalists"
 trait_mgd_environmentalists_desc:0 "This species is naturally driven to keep the ecosystems around them in pristine condition."
 trait_mgd_environmentalists_effects:0 "Happiness per uncleared Blocker: §G+1%§!"

 trait_mgd_tinkerers:0 "Tinkerers"
 trait_mgd_tinkerers_desc:0 "Engineering is the main point of interest for members of this species, as they have a strange attraction to all things mechanical."

 trait_mgd_gifted:0 "Gifted"
 trait_mgd_gifted_desc:0 "Members of this species develop early and often show great potential."


### Exclusive Traits Set ###
 trait_mgd_fungoid:0 "Fungoid"
 trait_mgd_fungoid_desc:0 "This species is capable of feeding on decaying matter for nutrients. They form a symbiotic relationship with Plantoids."
 trait_mgd_fungoid_effects:0 "Mineral upkeep per devastation on planet: §G-1%§!\n    - Based on the §HPlantoid-Fungoid-Ratio§!:\n        - Food Upkeep: up to §G-25%§!\n        - Habitability: up to §G+5%§!\n\n    - If ['trait:trait_plantoid_radiotrophic']: Effects also apply to §HEnergy Upkeep§!"

 trait_mgd_plantoid:0 "Plantoid"
 trait_mgd_plantoid_desc:0 "Unlike most lifeforms, this species has pronounced plant biology, utilizing unusual survival strategies. They form a symbiotic relationship with Fungoids, who break down minerals into nutrients for shared benefit."
 trait_mgd_plantoid_effects:0 "Food upkeep on §YWet§! worlds: §G-25%§!\n    - Based on the §HFungoid-Plantoid-Ratio§!:\n        - Food Upkeep: up to §G-25%§! \n        - Habitability: up to §G+5%§!\n\n    - If ['trait:trait_plantoid_phototrophic']: Effects also apply to §HEnergy Upkeep§!"

### Sapien Traits Set ###
 trait_mgd_prideful:0 "Prideful"
 trait_mgd_prideful_desc:0 "This species arrogantly believes themselves to be superior to others."
 trait_mgd_prideful_effects:0 "Pop Happiness while Vassalized: §R-10%§!"

 trait_mgd_pretentious:0 "Pretentious"
 trait_mgd_pretentious_desc:0 "Members of this species tend to value status over genuine skilla nd often have an inflated sense of self-importance."

 trait_mgd_cunning:0 "Cunning"
 trait_mgd_cunning_desc:0 "They are quick-witted and eloquent, members of this species have a natural talent for persuasion."
 trait_mgd_cunning_effects:0 "Leaders: §S25% Chance§! to be ['leader_trait:leader_trait_mgd_cunning']"

 trait_mgd_diplomatic:0 "Diplomatic"
 trait_mgd_diplomatic_desc:0 "Expert Negotiators, individuals of this species naturally seek common ground and mutual benefit. They excel at building positive relations."
 trait_mgd_diplomatic_effects:0 "Officials: §S50% Chance§! to be ['leader_trait:leader_trait_mgd_diplomat']"

 trait_mgd_ambitious:0 "Ambitious"
 trait_mgd_ambitious_desc:0 "They are driven by a relentless desire for achievement and power."

 trait_mgd_disciplined:0 "Disciplined"
 trait_mgd_disciplined_desc:0 "Their way of life is centered around order and routine."

 trait_mgd_scholarly:0 "Scholarly"
 trait_mgd_scholarly_desc:0 "Members of this species are devoted to learning and discovering."

 trait_mgd_natural_artisans:0 "Natural Artisans"
 trait_mgd_natural_artisans_desc:0 "This species is naturally gifted with artistic talent."
 trait_mgd_gifted_portrait_override_tt:0 "Requires a Psionic Species."

 trait_mgd_natural_blacksmiths:0 "Natural Blacksmiths"
 trait_mgd_natural_blacksmiths_desc:0 "Metalwork comes natural to this species."

 trait_mgd_cowards:0 "Cowards"
 trait_mgd_cowards_desc:0 "Generations of falling prey to others have left this species with an instinct to avoid confrontation."
 trait_mgd_cowards_effects:0 "Leaders: §S25% Chance§! to be ['leader_trait:leader_trait_mgd_wary']"

### Marine Traits Set ###


### Blighted Traits ###
 trait_mgd_nihilists:0 "Nihilists"
 trait_mgd_nihilists_desc:0 "This species instinctively rejects religious and spiritual ideologies."
 trait_mgd_nihilists_effects:0 "Unity Upkeep per 100 Pops: §R+1§!"

 trait_mgd_addicts:0 "Addicts"
 trait_mgd_addicts_desc:0 "Members of this species have a strong predisposition to addiction. Their withdrawal symptoms are more severe than those of other species."
 trait_mgd_addicts_effects:0 "Pop Amenities Usage without §YChemical Bliss§!: §R+25%§!\n    - Pop Consumer Goods Upkeep without §YChemical Bliss§!: §R+50%§!"

