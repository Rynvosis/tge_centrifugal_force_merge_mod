 concept_muteGDiversity_blighted_traits:0 "Blighted Trait"
 concept_muteGDiversity_blighted_traits_desc:0 "Blighted Traits are available to Toxoids, Fungoids, Lithoids and Molluscoids:\n- ['trait:trait_mgd_nihilists']\n- ['trait:trait_mgd_addicts']\n\n['concept_muteGDiversity']"
