 gk_prim_stage_breakthrough:0 "FTL Breakthrough"
 gk_prim_pioneering_situation_desc:0 "Our civilization stands on the threshold of interstellar travel. While crude prototype drives allow limited exploration, true faster-than-light capability remains beyond our reach. For now."
 gk_prim_situation_complete_tooltip:0 "Unlocks §YHyperdrive Technology§! for all ship classes."
 gk_prim_situation_paused:0 "Awaiting strategic decision"

 # Stages
 gk_prim_stage_dawn_tooltip:0 "The first tentative steps beyond our home system."
 gk_prim_stage_expansion_tooltip:0 "Prototype drives are now available for all ship classes."
 gk_prim_stage_breakthrough_tooltip:0 "A breakthrough in FTL physics is within reach. Colony ships receive §YPrototype Drives§!."

