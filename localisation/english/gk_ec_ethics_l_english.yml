l_english:
  # Individualist/Collectivist Ethic Axis
  ethic_individualist:0 "Individualist"
  ethic_fanatic_individualist:0 "Fanatic Individualist"
  ethic_collectivist:0 "Collectivist"
  ethic_fanatic_collectivist:0 "Fanatic Collectivist"
  ethic_individualist_desc:0 "§LThis society prizes private ownership, personal initiative, and competitive enterprise. Individuals are free to pursue success, and economic coordination emerges from voluntary exchange rather than collective control.§!\n"
  ethic_fanatic_individualist_desc:0 "§LPersonal sovereignty and private enterprise stand above all. Collective claims are subordinated to individual rights, and economic life is driven by unfettered initiative.§!\n"
  ethic_collectivist_desc:0 "§LThis society favors shared ownership and cooperative production. Economic life is organized to serve the common good rather than private accumulation.§!\n"
  ethic_fanatic_collectivist_desc:0 "§LThe means of production belong to the people as a whole. Collective control and social obligation define the economy, and private monopoly is rejected.§!\n"

  # Trigger tooltips
  empire_not_individualist:0 "Empire is not §YIndividualist§!"
  empire_is_individualist:0 "Empire is §YIndividualist§!"
  empire_not_fanatic_individualist:0 "Empire is not §YFanatic Individualist§!"
  empire_is_fanatic_individualist:0 "Empire is §YFanatic Individualist§!"
  empire_not_collectivist:0 "Empire is not §YCollectivist§!"
  empire_is_collectivist:0 "Empire is §YCollectivist§!"
  empire_not_fanatic_collectivist:0 "Empire is not §YFanatic Collectivist§!"
  empire_is_fanatic_collectivist:0 "Empire is §YFanatic Collectivist§!"

  # Modifier localization
  mod_pop_ethic_individualist_attraction_mult:0 "Individualist Ethics Attraction"
  mod_pop_ethic_collectivist_attraction_mult:0 "Collectivist Ethics Attraction"

  # Pop attraction descriptions
  POP_ATTRACTION_INDIVIDUALIST_ETHIC_POS:0 "§GIndividualist§! empire"
  POP_ATTRACTION_COLLECTIVIST_ETHIC_POS:0 "§GCollectivist§! empire"
  POP_ATTRACTION_THRIFTY_POS:0 "§GThrifty§! species value free enterprise"
  POP_ATTRACTION_SOLITARY_POS:0 "§GSolitary§! species value individual autonomy"
  POP_ATTRACTION_COMMUNAL_POS:0 "§GCommunal§! species favor collective organization"
  POP_ATTRACTION_DOCILE_POS:0 "§GDocile§! species adapt well to collective structures"
  POP_ATTRACTION_INDIVIDUALIST_DIPLOMACY_POS:0 "Diplomatic ties with §GIndividualist§! nations"
  POP_ATTRACTION_COLLECTIVIST_DIPLOMACY_POS:0 "Diplomatic ties with §GCollectivist§! nations"
  POP_ATTRACTION_TRADEFED_POS:0 "Member of a §GTrade League§!"

  # Faction names and descriptions
  gk_ec_individualist:0 "Individualists"
  gk_ec_individualist_desc:0 "Individualists champion private ownership, competitive enterprise, and merit-based hierarchy. They resist worker-owned models and redistribution that dilutes personal achievement."
  pft_gk_ec_individualist:0 "$gk_ec_individualist$"
  pft_gk_ec_individualist_desc:0 "$gk_ec_individualist_desc$"
  gk_ec_individualist_visual_ethic:0 "Individualist"
  gk_ec_collectivist:0 "Collectivists"
  gk_ec_collectivist_desc:0 "Collectivists demand worker ownership and oppose private monopolies. They favor cooperative production and economic systems that prioritize solidarity over profit."
  pft_gk_ec_collectivist:0 "$gk_ec_collectivist$"
  pft_gk_ec_collectivist_desc:0 "$gk_ec_collectivist_desc$"
  gk_ec_collectivist_visual_ethic:0 "Collectivist"

  # Promoted/suppressed modifiers
  gk_ec_promoted_individualist:0 "Promoted Individualist"
  gk_ec_promoted_individualist_desc:0 "This faction has been officially promoted."
  gk_ec_suppressed_individualist:0 "Suppressed Individualist"
  gk_ec_suppressed_individualist_desc:0 "This faction has been officially suppressed."
  gk_ec_promoted_collectivist:0 "Promoted Collectivist"
  gk_ec_promoted_collectivist_desc:0 "This faction has been officially promoted."
  gk_ec_suppressed_collectivist:0 "Suppressed Collectivist"
  gk_ec_suppressed_collectivist_desc:0 "This faction has been officially suppressed."

  ## Individualist Faction — Demands ##

  GK_EC_INDIVIDUALIST_NO_WELFARE:0 "No Welfare State"
  GK_EC_INDIVIDUALIST_WELFARE:0 "Excessive Redistribution"
  GK_EC_INDIVIDUALIST_NO_WELFARE_DESC:0 "Wealth redistribution destroys incentive. §YUtopian Abundance§! and §YShared Burden§! reward mediocrity. Citizens should earn their own prosperity."

  GK_EC_INDIVIDUALIST_MERCANTILE_STANCE:0 "Mercantile Diplomacy"
  GK_EC_INDIVIDUALIST_NO_MERCANTILE_STANCE:0 "No Trade Focus"
  GK_EC_INDIVIDUALIST_MERCANTILE_STANCE_DESC:0 "Our diplomatic posture should prioritize commercial opportunity. A §YMercantile§! stance signals that trade is the engine of progress."

  GK_EC_INDIVIDUALIST_COMMERCIAL_PACTS:0 "Trade Network"
  GK_EC_INDIVIDUALIST_NO_COMMERCIAL_PACTS:0 "Insufficient Trade Partners"
  GK_EC_INDIVIDUALIST_COMMERCIAL_PACTS_DESC:0 "A robust network of §YCommercial Pacts§! ensures diverse markets and healthy competition. More partners means more profit."

  GK_EC_INDIVIDUALIST_PRIVATE_ENTERPRISE:0 "Private Enterprise"
  GK_EC_INDIVIDUALIST_NO_PRIVATE_ENTERPRISE:0 "No Private Enterprise"
  GK_EC_INDIVIDUALIST_PRIVATE_ENTERPRISE_DESC:0 "The economy thrives with §YMerchant Guilds§!, §YCorporate Dominion§!, or §YFree Traders§! at its helm, championing individual enterprise free from collective control."

  GK_EC_INDIVIDUALIST_TRADE_FEDERATION:0 "Trade League Membership"
  GK_EC_INDIVIDUALIST_NO_TRADE_FEDERATION:0 "No Trade League"
  GK_EC_INDIVIDUALIST_TRADE_FEDERATION_DESC:0 "A §YTrade League§! represents the ideal form of interstellar cooperation, offering mutual profit without political entanglement."

  GK_EC_INDIVIDUALIST_CIVILIAN_ECONOMY:0 "Civilian Economy"
  GK_EC_INDIVIDUALIST_NO_CIVILIAN_ECONOMY:0 "Militarized Economy"
  GK_EC_INDIVIDUALIST_CIVILIAN_ECONOMY_DESC:0 "Economic policy should favor consumer markets over military-industrial production. A §YCivilian§! or §YBalanced§! economy drives growth through prosperity, not arms."

  GK_EC_INDIVIDUALIST_ANTI_COOPERATIVE:0 "Reject Cooperativism"
  GK_EC_INDIVIDUALIST_COOPERATIVE:0 "Cooperative Stance Active"
  GK_EC_INDIVIDUALIST_ANTI_COOPERATIVE_DESC:0 "A §YCooperative§! diplomatic stance sacrifices competitive advantage. We should not subordinate our interests to the collective."

  GK_EC_INDIVIDUALIST_NO_SHARED_BURDEN:0 "Reject Shared Burden"
  GK_EC_INDIVIDUALIST_SHARED_BURDEN:0 "Shared Burden Economy"
  GK_EC_INDIVIDUALIST_NO_SHARED_BURDEN_DESC:0 "§YWorker Cooperatives§! stifle individual enterprise. The economy functions best when driven by personal ambition, not communal obligation."

  ## Collectivist Faction — Demands ##

  GK_EC_COLLECTIVIST_WELFARE:0 "Social Welfare"
  GK_EC_COLLECTIVIST_NO_WELFARE:0 "Inadequate Welfare"
  GK_EC_COLLECTIVIST_WELFARE_DESC:0 "A just society provides for all its members. §YUtopian Abundance§! or §YShared Burden§! reflects our highest ideals, while §YGood§! conditions are a step in the right direction."

  GK_EC_COLLECTIVIST_NO_STRATIFICATION:0 "End Stratification"
  GK_EC_COLLECTIVIST_STRATIFICATION:0 "Stratified Living Standards"
  GK_EC_COLLECTIVIST_NO_STRATIFICATION_DESC:0 "§YStratified Economy§! and §YDystopian Society§! are exploitations of the working class. No one should be consigned to deprivation."

  GK_EC_COLLECTIVIST_COOPERATIVE_STANCE:0 "Cooperative Diplomacy"
  GK_EC_COLLECTIVIST_NO_COOPERATIVE_STANCE:0 "No Cooperative Stance"
  GK_EC_COLLECTIVIST_COOPERATIVE_STANCE_DESC:0 "Our relations with other nations should emphasize mutual benefit. A §YCooperative§! diplomatic stance embodies solidarity over competition."

  GK_EC_COLLECTIVIST_WORKER_OWNERSHIP:0 "Worker Ownership"
  GK_EC_COLLECTIVIST_NO_WORKER_OWNERSHIP:0 "No Worker Ownership"
  GK_EC_COLLECTIVIST_WORKER_OWNERSHIP_DESC:0 "The means of production should be owned collectively. §YWorker Cooperatives§! combined with §YShared Burden§! or §YWorker Ownership§! living standards represent the ideal."

  GK_EC_COLLECTIVIST_NO_MONOPOLIES:0 "No Private Monopolies"
  GK_EC_COLLECTIVIST_MONOPOLIES:0 "Private Monopolies"
  GK_EC_COLLECTIVIST_NO_MONOPOLIES_DESC:0 "Concentrated private power undermines collective prosperity. §YMerchant Guilds§!, §YCorporate Dominion§!, and §YFree Traders§! must not be tolerated."

  GK_EC_COLLECTIVIST_ANTI_MERCANTILE:0 "Reject Mercantilism"
  GK_EC_COLLECTIVIST_MERCANTILE:0 "Mercantile Stance Active"
  GK_EC_COLLECTIVIST_ANTI_MERCANTILE_DESC:0 "A §YMercantile§! diplomatic posture prioritizes profit over solidarity. Commerce should serve the community, not the other way around."

  GK_EC_COLLECTIVIST_NUTRITIONAL_PLENITUDE:0 "Nutritional Plenitude"
  GK_EC_COLLECTIVIST_NO_NUTRITIONAL_PLENITUDE:0 "No Nutritional Plenitude"
  GK_EC_COLLECTIVIST_NUTRITIONAL_PLENITUDE_DESC:0 "The state has an obligation to ensure no citizen goes hungry. §YNutritional Plenitude§! is a hallmark of a caring society."

  GK_EC_COLLECTIVIST_NO_TRADE_FEDERATION:0 "Reject Trade League"
  GK_EC_COLLECTIVIST_TRADE_FEDERATION:0 "Trade Federation Membership"
  GK_EC_COLLECTIVIST_NO_TRADE_FEDERATION_DESC:0 "§YTrade Leagues§! entrench capitalist interests at the interstellar level. We should seek more equitable forms of cooperation."

  # Custom ethic modifier tooltips
  GK_EC_AUTH_TT_FANATIC:0 "$MOD_COUNTRY_INFLUENCE_GAIN_ADD$: §G+1§!$TABBED_NEW_LINE$$BONUS_WORKFORCE_FOR$ ['concept_planet_enforcers']: §G+20%§!$TABBED_NEW_LINE$$BONUS_WORKFORCE_FOR$ $pop_cat_slave_plural$: §G+10%§!"
  GK_EC_AUTH_TT_REGULAR:0 "$MOD_COUNTRY_INFLUENCE_GAIN_ADD$: §G+0.50§!$TABBED_NEW_LINE$$BONUS_WORKFORCE_FOR$ ['concept_planet_enforcers']: §G+10%§!$TABBED_NEW_LINE$$BONUS_WORKFORCE_FOR$ $pop_cat_slave_plural$: §G+5%§!"
