l_english:
 # GK Raiding — Privateer Enclave localisation

 # Civic
 civic_gk_privateer_enclave: "Privateer Enclave"
 civic_gk_privateer_enclave_desc: "This enclave operates as a privateer outpost, launching raids against nearby empires on behalf of its patron."

 # Ship size
 gk_privateer_station: "Privateer Station"
 gk_privateer_station_plural: "Privateer Stations"

 # Ship design
 NAME_GK_Privateer_Enclave_Station: "Privateer Outpost"

 # Trade window scripted loc keys
 GK_PRIVATEER_LOC:0 "Privateer"
 GK_ENCLAVE_OFFER_ACTION_HIRE:0 "to hire a £military_ship£§RMercenary Fleet (£military_power£"
 GK_ENCLAVE_OFFER_ACTION_MINDWARDEN:0 "to hire a £military_ship£§RMindwarden Fleet (£military_power£"
 GK_ENCLAVE_OFFER_ACTION_COMMISSION:0 "to fund a £military_ship£§RPrivateer Fleet (£military_power£"
 GK_ENCLAVE_OFFER_SUFFIX_HIRE:0 " "
 GK_ENCLAVE_OFFER_SUFFIX_COMMISSION:0 " to raid §Y[event_target:gk_commission_raid_target.GetName]§!"
 GK_ENCLAVE_OFFER_DURATION_HIRE:0 "for"
 GK_ENCLAVE_OFFER_DURATION_RAID:0 "for"

 # Enclave founding (enclave.2 overwrite)
 GK_RAIDING_ENCLAVE_2_DESC:0 "Our scouts have identified a viable location for a permanent base of operations in the void between stars. The site offers natural concealment and defensible approaches, ideal for establishing a presence beyond the reach of conventional patrols.\n\nOur §Ydespoliation expertise§! opens an additional possibility. Rather than a standard mercenary enclave, we could establish a §Yprivateer haven§!, a privateer outpost that would launch raids on our behalf, sowing chaos among our rivals.\n\nThe choice is yours, Commander."
 GK_RAIDING_ENCLAVE_2_MERCENARY:0 "Establish Mercenary Enclave"
 GK_RAIDING_ENCLAVE_2_PRIVATEER:0 "Establish Privateer Haven"
 GK_RAIDING_ENCLAVE_2_PRIVATEER_TOOLTIP:0 "A Privateer Haven is founded."

 # Conversion (enclave.205 overwrite + privateers.205)
 GK_RAIDING_ENCLAVE_205_CONVERT_PRIVATEER:0 "Convert to Privateer Haven"
 gk_privateer_tt_convert_to_privateer:0 "Convert this mercenary enclave into a §YPrivateer Haven§!. Costs §Y100§! influence. Upgrade ranks are preserved."
 gk_privateer_tt_convert_fleet_leased:0 "Cannot convert while the enclave has a fleet on loan."
 GK_RAIDING_PRIVATEERS_205_CONVERT_MERC:0 "Convert to Mercenary Company"
 gk_privateer_tt_convert_to_merc:0 "Convert this privateer haven back into a §YMercenary Enclave§!. Costs §Y100§! influence. Upgrade ranks are preserved.\n\n§LRequires the Despoliation tradition finisher.§!"
 gk_privateer_tt_convert_raid_ongoing:0 "Cannot convert while the enclave is conducting a raid."

 # Events — Conversion notifications (114, 115)
 gk_raiding_privateers.114.name:0 "Enclave Converted"
 gk_raiding_privateers.114.desc.stoic:0 "The [event_target:gk_privateer_enclave_country.GetName] has completed its transformation. What was once a mercenary company is now a privateer outpost. The crew accepted the change without comment, already adjusting their operations to the new mandate.\n\n§Y\"Refit complete. We are ready for new orders, patron.\"§!"
 gk_raiding_privateers.114.desc.screamer:0 "The [event_target:gk_privateer_enclave_country.GetName] is REBORN! The crew has enthusiastically torn down the old mercenary signage and replaced it with... something louder. Much louder.\n\n§Y\"HYEEEIIIEEE!!!! No more rental! Now we SMASH for ourselves! Patron says smash, WE SMASH! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.114.desc.cultist:0 "The [event_target:gk_privateer_enclave_country.GetName] has been reconsecrated. The crew performed rites of transformation, marking the station's walls with new sigils. Their leader's voice trembled with fervor.\n\n§Y\"She of the Void has ordained this change. We are Her instruments now, patron. Point us toward the offerings.\"§!"
 gk_raiding_privateers.114.desc.calculating:0 "The [event_target:gk_privateer_enclave_country.GetName] has been restructured. The crew immediately began repurposing rental infrastructure for autonomous operations. Efficiency projections are favorable.\n\n§Y\"Reconfiguration complete. Operational paradigm shift: mercenary rental to directed raiding. All systems nominal, patron.\"§!"
 gk_raiding_privateers.114.desc.merchant:0 "The [event_target:gk_privateer_enclave_country.GetName] is under new management! Well, same management, new business model. The crew seems genuinely excited about the pivot.\n\n§Y\"Out with the old, in with the bold! No more fleet rentals, friend. From now on, we bring the goods directly to your doorstep!\"§!"
 gk_raiding_privateers.114.desc.automaton:0 "The [event_target:gk_privateer_enclave_country.GetName] has been reconfigured. All subsystems repurposed for autonomous raiding operations in 0.007 cycles.\n\n§Y\"OPERATIONAL MODE UPDATED. Mercenary rental protocols archived. Raiding subroutines loaded. Awaiting target designations from command authority.\"§!"
 gk_raiding_privateers.115.name:0 "Enclave Reverted"
 gk_raiding_privateers.115.desc:0 "The [From.GetName] has completed its transition back to a standard mercenary company. The pirate aesthetics have been stripped away and replaced with professional insignia. Fleet rental services are now available."

 # Cancel Raid
 gk_raiding_privateers.205.cancel_raid:0 "Cancel Raid"
 gk_privateer_tt_cancel_raid:0 "Recall the raiding fleet. No fee. The fleet returns empty-handed."
 gk_raiding_privateers.346.name:0 "Raid Cancelled"
 gk_raiding_privateers.346.desc:0 "The funded raid against [event_target:gk_raid_target.GetName] has been called off. The [event_target:gk_privateer_enclave_country.GetName]'s fleet is returning to base."
 gk_raiding_privateers.347.name:0 "Raiders Withdraw"
 gk_raiding_privateers.347.desc:0 "The [event_target:gk_privateer_enclave_country.GetName]'s raiding fleet has been recalled. Their ships are pulling back from our territory."

 # Events — Haven Established (102)
 gk_raiding_privateers.102.name:0 "A Haven Among the Stars"
 gk_raiding_privateers.102.desc.stoic:0 "The [event_target:gk_privateer_enclave_country.GetName] is operational. The crew settled in without ceremony, fortifying the station with quiet efficiency. Their leader transmitted a brief acknowledgment:\n\n§Y\"Station secured. Defenses nominal. We await your contracts, patron. Our blades are sharp and our holds are empty.\"§!"
 gk_raiding_privateers.102.desc.screamer:0 "The [event_target:gk_privateer_enclave_country.GetName] is... established, though the volume of celebratory transmissions nearly burned out the comms relay. The crew has already begun fortifying the station between bouts of what can only be described as competitive shrieking.\n\n§Y\"HYEEEIIIEEE!!!! New home! New home for smashing dwamaks! You send us dwamaks to smash, yes? HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.102.desc.cultist:0 "The [event_target:gk_privateer_enclave_country.GetName] has been consecrated. The crew performed rites of dedication before taking residence, anointing the station's bulkheads with markings of devotion. Their leader's transmission carried a reverent gravity:\n\n§Y\"She of the Void has blessed this sanctuary. The station breathes with Her presence. We shall carry out Her will from this place, patron. Send us those who would be offered.\"§!"
 gk_raiding_privateers.102.desc.calculating:0 "The [event_target:gk_privateer_enclave_country.GetName] is online. Sensor arrays were calibrated before the crew even unpacked. Their leader transmitted an efficiency report within the hour:\n\n§Y\"Station operational. Defensive grid: optimal. Patrol route analysis: complete. Resource projection models loaded. We are ready to begin operations, patron. Transmit target parameters at your convenience.\"§!"
 gk_raiding_privateers.102.desc.merchant:0 "The [event_target:gk_privateer_enclave_country.GetName] is open for business! The crew wasted no time making the station feel welcoming, stringing up trophy displays and what appears to be a lounge area. Their leader's transmission was practically beaming:\n\n§Y\"Welcome, welcome to the grand opening! The [event_target:gk_privateer_enclave_country.GetName] is officially accepting clients. We look forward to a long and mutually profitable partnership, friend!\"§!"
 gk_raiding_privateers.102.desc.automaton:0 "The [event_target:gk_privateer_enclave_country.GetName] is online. Station initialization completed in 0.003 cycles. Defensive subsystems nominal. Sensor grid calibrated. A clipped synthetic voice sounds over the data link.\n\n§Y\"HAVEN PROTOCOL INITIALIZED. Station designation assigned. Defensive perimeter established. Awaiting directives from command authority. All combat subroutines are loaded and standing by.\"§!"

 # Diplomacy window — Greeting (205)
 gk_raiding_privateers.205.name:0 "Privateer Haven"
 # Friendly greetings
 gk_raiding_privateers.205.desc.stoic:0 "The privateer haven's communication array crackles to life, revealing a scarred figure sitting upright in a command chair. They regard you with professional calm.\n\n§Y\"Speak, patron. Our blades are sharp and our holds are empty. If you have work, we are listening. If not, we have duties to attend to.\"§!"
 gk_raiding_privateers.205.desc.screamer:0 "The haven's communication array erupts with noise before the visual feed even stabilizes. A wild-eyed figure is bouncing in their command chair, gesticulating enthusiastically.\n\n§Y\"HYEEEIIIEEE!!!! Is the dwamak-boss! What you want, dwamak-boss? You have dwamaks for us to smash? We very good at smashing! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.205.desc.cultist:0 "The haven's communication array hums with a low, resonant frequency before the feed resolves. A robed figure sits motionless, eyes half-closed as if in meditation. When they speak, their voice carries the weight of ritual.\n\n§Y\"She of the Void has guided your signal to us. This is no coincidence. Speak, patron, and know that She listens through us.\"§!"
 gk_raiding_privateers.205.desc.calculating:0 "The haven's communication array connects with unusual speed, as though the signal was anticipated. A composed figure studies a data display before turning their attention to the screen.\n\n§Y\"Connection established. Current operational status: nominal. Fleet readiness at 94.7%. State your requirements, patron. We have prepared several operational proposals based on projected regional threat assessments.\"§!"
 gk_raiding_privateers.205.desc.merchant:0 "The haven's communication array opens to a warmly lit interior. A grinning figure raises a drink in greeting, lounging comfortably amid trophy displays and trade ledgers.\n\n§Y\"Well, well! If it isn't our favorite client! Come in, come in. What can the [event_target:gk_privateer_enclave_country.GetName] do for you today? We have some exciting new opportunities on the table.\"§!"
 gk_raiding_privateers.205.desc.automaton:0 "The haven's communication array responds instantly, the connection established before the hail sequence completes. No face appears on screen. A tactical overlay fills the display: fleet positions, threat vectors, patrol routes updated in real time. A flat synthetic voice speaks over the data feed.\n\n§Y\"Command authority recognized. Connection secured. Current operational status: all combat platforms nominal. Query: state desired service or directive.\"§!"
 # Greeting options (205)
 gk_raiding_privateers.205.b:0 "We want access to your §YRaider Intelligence§!."
 gk_raiding_privateers.205.c:0 "We are interested in setting up a §YSmuggler's Port§!."
 gk_raiding_privateers.205.d:0 "We wish to §Yrecruit raiders§!."
 gk_raiding_privateers.205.e:0 "As your §YPatron§!, we want to review our options."
 # Greeting option tooltips
 gk_privateer_tt_intel:0 "Temporary §Ydamage bonus§! against your §Yrivals§! at the cost of increased §Ycrime§!."
 gk_privateer_tt_garrison:0 "Purchase a §Ystarbase building§! license that boosts §Ytrade§! in the system."
 gk_privateer_tt_armies:0 "Hire §Yarmies§! for ground invasions."
 gk_privateer_tt_patron:0 "As §YPatron§!, upgrade the haven or share technology."

 # Hostile greetings
 gk_raiding_privateers.205.desc.stoic.hostile:0 "The haven's communication array connects after a long delay. The figure on screen regards you with cold contempt.\n\n§R\"You are no patron of ours. We have nothing to discuss. Leave this channel, or the next message you receive will be a torpedo volley.\"§!"
 gk_raiding_privateers.205.desc.screamer.hostile:0 "The haven's communication array nearly overloads as it connects. The figure on screen is visibly enraged, slamming fists against the console.\n\n§R\"HYEEEIIIEEE!!!! DWAMAK! STUPID DWAMAK! You dare hail us?! We smash your ships! We smash your stations! We smash EVERYTHING! GET OUT! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.205.desc.cultist.hostile:0 "The haven's communication array opens to near-darkness. A figure barely visible in candlelight speaks in a voice trembling with fury.\n\n§R\"She of the Void sees you, heretic. She sees you and She is wroth. Your presence profanes this channel. Begone, before we deliver you unto Her judgment.\"§!"
 gk_raiding_privateers.205.desc.calculating.hostile:0 "The haven's communication array connects with clinical efficiency. The figure on screen does not look up from their data display.\n\n§R\"Hostile contact detected. Threat assessment: negligible. Communication value: zero. Recommendation: terminate connection. Your vessels have been tagged for priority targeting. That is all.\"§!"
 gk_raiding_privateers.205.desc.merchant.hostile:0 "The haven's communication array connects, but the warmth is gone. The figure on screen regards you with the cold disappointment of a deal gone sour.\n\n§R\"I'm afraid your account has been permanently closed. Bad business, you understand. Nothing personal, but we've flagged your transponder codes for our raiding crews. I'd suggest avoiding this sector. Goodbye.\"§!"
 gk_raiding_privateers.205.desc.automaton.hostile:0 "The haven's communication array connects with mechanical precision. The display shows only a red tactical overlay with your fleet positions highlighted as hostile contacts.\n\n§R\"WARNING: Unauthorized access attempt. Transponder signature classified as hostile. All combat platforms have been allocated to intercept trajectory. Probability of your survival in this sector: declining. Terminate connection.\"§!"

 # ──────────────────────────────────────────────────────────────────
 # Diplomacy Services (300–399)
 # ──────────────────────────────────────────────────────────────────

 # Shared
 gk_raiding_privateers.300.return:0 "Discuss Another Matter"

 # .300 — Upgrade Haven
 gk_raiding_privateers.300.name:0 "Upgrade Haven"
 gk_raiding_privateers.300.1.desc:0 "The haven is functional but austere, little more than a fortified waystation. With investment in alloys and trade goods, the privateers could expand their docking bays, improve their sensor arrays, and field a larger raiding fleet.\n\n§YUpgrade to Rank 1: §!£alloys£ §Y500§! + £energy£ §Y1,000§!"
 gk_raiding_privateers.300.2.desc:0 "The haven has grown beyond its initial foundations. Additional berths line the station's flanks, and the privateers have begun specializing their raiding crews. Further investment would allow them to expand their operational range significantly.\n\n§YUpgrade to Rank 2: §!£alloys£ §Y1,250§! + £energy£ §Y2,500§!"
 gk_raiding_privateers.300.3.desc:0 "The privateers have established a formidable base of operations. Their fleet has diversified, and their raids strike deeper into hostile territory. The next tier of expansion would require substantial resources but would transform the haven into a true fortress.\n\n§YUpgrade to Rank 3: §!£alloys£ §Y2,750§! + £energy£ §Y5,500§!"
 gk_raiding_privateers.300.4.desc:0 "The haven bristles with weaponry and hums with activity. Patrol craft launch around the clock, and the privateers' reputation precedes them across the sector. One final push would elevate this outpost to its maximum potential.\n\n§YUpgrade to Rank 4: §!£alloys£ §Y5,000§! + £energy£ §Y10,000§!"
 gk_raiding_privateers.300.5.desc:0 "The haven stands as one of the most formidable independent stations in the galaxy. This final investment would push the privateers to peak operational capacity, fielding a fleet rivaling that of minor empires.\n\n§YUpgrade to Rank 5: §!£alloys£ §Y6,500§! + £energy£ §Y13,000§!"

 # .305 — Thanks / Confirmation
 gk_raiding_privateers.305.name:0 "Transaction Complete"
 gk_raiding_privateers.305.desc.stoic:0 "A curt nod from the haven's commander.\n\n§Y\"Acknowledged. The resources will be put to use. You will see the results.\"§!"
 gk_raiding_privateers.305.desc.screamer:0 "Ecstatic shrieking erupts across the channel.\n\n§Y\"HYEEEIIIEEE!!!! YES YES YES! Good deal! VERY good deal! We do good things with this! You see! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.305.desc.cultist:0 "The haven's commander places a hand over their heart and bows deeply.\n\n§Y\"She of the Void smiles upon this exchange. Your generosity shall be repaid tenfold, patron. The covenant is sealed.\"§!"
 gk_raiding_privateers.305.desc.calculating:0 "The haven's commander updates their ledger with precise keystrokes.\n\n§Y\"Transaction logged. Resource allocation confirmed. Updated projections indicate a 14.3% improvement in operational output. A satisfactory arrangement.\"§!"
 gk_raiding_privateers.305.desc.merchant:0 "The haven's commander raises a glass with a broad grin.\n\n§Y\"Pleasure doing business! Always a pleasure! You won't regret this, friend. The [event_target:gk_privateer_enclave_country.GetName] takes care of its partners!\"§!"
 gk_raiding_privateers.305.desc.automaton:0 "A brief confirmation pulse over the data link.\n\n§Y\"Transaction complete. Resources received and allocated. Operational parameters updated. Standing by for further directives.\"§!"


 # .315 — Raider Intelligence
 gk_raiding_privateers.315.name:0 "Raider Intelligence"
 gk_raiding_privateers.315.desc.stoic:0 "The haven's commander studies the display before speaking.\n\n§Y\"Our raiders have gathered detailed intelligence on your rivals. Fleet compositions, patrol schedules, defensive blind spots. This data would give your forces a permanent tactical edge against any power you've designated as a rival. Our information network does require a certain... presence on your worlds.\"§!"
 gk_raiding_privateers.315.desc.screamer:0 "The haven's commander slams a data chip on the console.\n\n§Y\"HYEEEIIIEEE!!!! We spy on your enemies! We watch them! We know where they go, when they sleep, what they eat! You take this, you SMASH them extra good! We put some of our sneaky-types on your worlds to keep watching. Very sneaky! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.315.desc.cultist:0 "The haven's commander gazes into the middle distance, as if communing with something unseen.\n\n§Y\"She of the Void sees all who traverse Her domain. Through Her sight, we have learned the secrets of your rivals. Accept Her gift of knowledge, and your fleets will strike with divine precision. Her agents will walk among your people, ever watchful.\"§!"
 gk_raiding_privateers.315.desc.calculating:0 "The haven's commander displays a comprehensive threat analysis.\n\n§Y\"Intelligence compilation complete. Data package contains: rival fleet deployment patterns, defensive architecture schematics, and predictive models for force projection. Integration yields an estimated 15% improvement in combat effectiveness against designated rivals. Requires placement of intelligence operatives on your worlds.\"§!"
 gk_raiding_privateers.315.desc.merchant:0 "The haven's commander taps a sealed data container.\n\n§Y\"I have something special for you today, friend. Premium intelligence on every rival you've marked. Fleet movements, defense gaps, the works. This isn't a rental, it's a permanent advantage. We just need to station a few of our people on your worlds to keep the information flowing. Small price, big returns!\"§!"
 gk_raiding_privateers.315.desc.automaton:0 "A compressed intelligence package appears on the display, tagged with rival designations.\n\n§Y\"Service available: persistent surveillance integration. Package contains fleet composition databases, patrol route predictions, and defensive vulnerability maps for all designated rival entities. Requires deployment of monitoring nodes on your worlds. Permanent tactical advantage confirmed.\"§!"

 # .320 — Raider Garrison
 gk_raiding_privateers.320.name:0 "Raider Garrison"
 gk_raiding_privateers.320.desc.stoic:0 "The haven's commander straightens in their chair.\n\n§Y\"We can provide garrison crews for your starbases. Experienced fighters who know how to hold a chokepoint. Their presence improves the combat readiness of any fleet in the system. Our people operate outside conventional law, so expect some friction with local authorities.\"§!"
 gk_raiding_privateers.320.desc.screamer:0 "The haven's commander punches the air enthusiastically.\n\n§Y\"HYEEEIIIEEE!!!! You want TOUGH GUYS on your stations? We have TOUGHEST GUYS! They fight so good! Make all your ships nearby fight better too! Maybe they cause little trouble with your law-types but THEY SO TOUGH! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.320.desc.cultist:0 "The haven's commander places a blessed talisman on the console.\n\n§Y\"She of the Void would have Her faithful stand sentinel at your borders. Our warriors will consecrate your starbases with their presence, and their fervor will inspire all who fight alongside them. Their... devotional practices may unsettle your citizenry, however.\"§!"
 gk_raiding_privateers.320.desc.calculating:0 "The haven's commander brings up a starbase schematic.\n\n§Y\"Proposal: garrison deployment at your starbase facilities. Force multiplier effect: 15% fire rate increase for all friendly vessels within system range. Personnel overhead minimal. Note: garrison personnel operate outside standard legal frameworks, generating a measurable increase in criminal activity.\"§!"
 gk_raiding_privateers.320.desc.merchant:0 "The haven's commander spreads their hands wide.\n\n§Y\"Here's a fantastic offer for you, friend! Our finest fighters, stationed right on your starbases. They'll make every ship in the system fight harder. The license covers installation at any starport or higher. Our people do tend to run a few side businesses, but nothing too disruptive!\"§!"
 gk_raiding_privateers.320.desc.automaton:0 "A starbase integration schematic fills the display.\n\n§Y\"Service available: garrison combat platform deployment. Units will integrate with starbase defensive systems and provide force multiplication to all friendly vessels in the operational area. Note: garrison units operate on autonomous combat protocols outside standard regulatory frameworks.\"§!"

 # .325 — Recruit Raiders
 gk_raiding_privateers.325.name:0 "Recruit Raiders"
 gk_raiding_privateers.325.desc.stoic:0 "The haven's commander gestures to a roster on the display.\n\n§Y\"We have fighters available for ground operations. Battle-hardened crews who can be organized into army transports and deployed to your capital within the day. Interested?\"§!"
 gk_raiding_privateers.325.desc.screamer:0 "The haven's commander bounces excitedly.\n\n§Y\"HYEEEIIIEEE!!!! You want GROUND SMASHERS? We have them! Big ones! Mean ones! They smash planets REAL GOOD! We put them on ships, send to your big world! How many you want? HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.325.desc.cultist:0 "The haven's commander's eyes gleam with fervent light.\n\n§Y\"She of the Void has warriors ready to descend upon the faithless. Holy crusaders, zealous and unyielding. They will be delivered unto your capital in sacred transports, eager to carry out Her will on the surface of heretic worlds.\"§!"
 gk_raiding_privateers.325.desc.calculating:0 "The haven's commander displays personnel readiness data.\n\n§Y\"Ground force requisition available. Personnel are combat-rated and transport-ready. Deployment time to your capital system: estimated 24 standard hours. Two force packages available, scaled by mission requirements.\"§!"
 gk_raiding_privateers.325.desc.merchant:0 "The haven's commander pulls out a catalog with a grin.\n\n§Y\"Looking for some muscle? You've come to the right place! We have experienced ground fighters ready to ship out to your capital at a moment's notice. Small squad, large squad, pick your package!\"§!"
 gk_raiding_privateers.325.desc.automaton:0 "A personnel deployment manifest populates the display.\n\n§Y\"Service available: ground assault unit requisition. Combat-rated personnel are transport-ready. Estimated deployment time to command authority capital: minimal. Two force configurations available. Select desired package.\"§!"
 gk_raiding_privateers.325.a:0 "A small squad of raiders. §Y(5 armies)§!"
 gk_raiding_privateers.325.b:0 "A large squad of raiders. §Y(10 armies)§!"
 gk_raiding_privateers.325.a.tooltip:0 "§Y5§! mercenary armies will be deployed to our capital system."
 gk_raiding_privateers.325.b.tooltip:0 "§Y10§! mercenary armies will be deployed to our capital system."

 # .330 — Share Technology
 gk_raiding_privateers.330.name:0 "Share Technology"
 gk_raiding_privateers.330.desc.stoic:0 "The haven's commander considers the proposal in silence before responding.\n\n§Y\"You wish to share your research data with us. This would be... valuable. We can offer compensation for the transfer. Our engineers will integrate what they can into our systems. It will take time before we are ready to receive another update.\"§!"
 gk_raiding_privateers.330.desc.screamer:0 "The haven's commander tilts their head with unusual focus.\n\n§Y\"You give us SMART STUFF? Like, how to make better guns? Better shields? HYEEEIIIEEE!!!! YES! We take! We give you credits! Then we need long time to figure out all the buttons! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.330.desc.cultist:0 "The haven's commander clasps their hands in reverent anticipation.\n\n§Y\"You would share the fruits of knowledge with Her faithful? She of the Void blesses this exchange. We shall study these revelations with devotion. Accept this offering of credits in return. It will be some years before we have absorbed these teachings fully.\"§!"
 gk_raiding_privateers.330.desc.calculating:0 "The haven's commander's eyes light up with genuine interest.\n\n§Y\"Technology transfer proposal accepted. Data integration estimate: significant. Compensation authorized: 1,000 energy credits. Note: full absorption of transferred research will require approximately 10 standard years before another data package can be processed.\"§!"
 gk_raiding_privateers.330.desc.merchant:0 "The haven's commander rubs their hands together eagerly.\n\n§Y\"You want to share your tech with us? Now that is a generous offer! Tell you what, we'll send over some credits as a thank you. Fair warning, it'll be a while before our engineers can handle another batch. They're good, but they're not miracle workers!\"§!"
 gk_raiding_privateers.330.desc.automaton:0 "A data transfer interface opens on the display.\n\n§Y\"Technology transfer protocol ready. Research data will be integrated into operational systems. Compensation: 1,000 energy credits authorized. Processing time for full integration: approximately 10 standard years. Subsequent transfers will be queued until current cycle completes.\"§!"
 gk_raiding_privateers.330.tooltip:0 "The enclave copies our technology. 10-year cooldown."

 # .335 — Patron Panel
 gk_raiding_privateers.335.name:0 "Patron Panel"
 gk_raiding_privateers.335.desc.stoic:0 "The haven's commander acknowledges your patron authority with a formal salute.\n\n§Y\"Patron. As system owner, you have access to our operational command functions. State your directives.\"§!"
 gk_raiding_privateers.335.desc.screamer:0 "The haven's commander practically vibrates with excitement at seeing their patron.\n\n§Y\"HYEEEIIIEEE!!!! Is the BIG BOSS! The one who OWNS the space! What the big boss want? We do anything for big boss! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.335.desc.cultist:0 "The haven's commander drops to one knee in reverence.\n\n§Y\"Patron and protector. You who shelter Her sanctuary within your domain. The inner mysteries are open to you. Command us, and Her will shall be done.\"§!"
 gk_raiding_privateers.335.desc.calculating:0 "The haven's commander opens an administrative interface.\n\n§Y\"Patron access confirmed. System ownership verified. Administrative functions unlocked. All strategic options are available for your review.\"§!"
 gk_raiding_privateers.335.desc.merchant:0 "The haven's commander greets you with extra warmth.\n\n§Y\"The boss of bosses! Welcome to the VIP lounge, friend. As our patron and landlord, you get access to the premium services. What can we do for you today?\"§!"
 gk_raiding_privateers.335.desc.automaton:0 "An administrative interface unlocks on the display.\n\n§Y\"Command authority verified. System sovereignty confirmed. Elevated access granted. All strategic directives are available. State your command.\"§!"
 gk_raiding_privateers.335.upgrade:0 "We want to §Yupgrade§! the haven."
 gk_raiding_privateers.335.tech:0 "We are inclined to share our §Ytechnology§! with you."
 gk_raiding_privateers.335.tech.timeout:0 "The enclave is still processing the last technology transfer."

 # ──────────────────────────────────────────────────────────────────
 # Modifiers
