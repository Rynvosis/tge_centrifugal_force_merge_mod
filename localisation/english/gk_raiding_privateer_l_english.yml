 # Fund Raid (340–342)
 # ──────────────────────────────────────────────────────────────────

 # .205.f — Fund Raid option + tooltips
 gk_raiding_privateers.205.f:0 "We wish to §Yfund a raid§!."
 gk_privateer_tt_commission:0 "Pay the enclave to §Yraid a rival§! immediately."
 gk_privateer_tt_commission_no_fleet:0 "The enclave has no available raid fleet."
 gk_privateer_tt_commission_raid_ongoing:0 "The enclave is already conducting a raid."

 # .339 — Fund Raid: Payment
 gk_raiding_privateers.339.name:0 "Fund Raid"
 gk_raiding_privateers.339.desc.stoic:0 "The haven's commander reviews the fleet's readiness with a practiced eye.\n\n§Y\"You want a specific empire hit. We can arrange that. Our fleet is ready. Agree to our terms and we will prepare target options.\"§!"
 gk_raiding_privateers.339.desc.screamer:0 "The haven's commander is practically vibrating with excitement at the prospect of a paid job.\n\n§Y\"HYEEEIIIEEE!!!! You want us SMASH someone?! PAY US AND WE SMASH! WE SMASH SO GOOD! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.339.desc.cultist:0 "The haven's commander inclines their head reverently, sensing an opportunity to carry out divine will.\n\n§Y\"She of the Void approves. Our fleet stands ready to carry Her judgment. Accept our terms, and we shall present the faithless for your choosing.\"§!"
 gk_raiding_privateers.339.desc.calculating:0 "The haven's commander brings up a fleet readiness assessment.\n\n§Y\"Fleet status: combat ready. Deployment fee calculated based on fleet deployment value. Accept terms to proceed to target selection.\"§!"
 gk_raiding_privateers.339.desc.merchant:0 "The haven's commander rubs their hands together with a broker's enthusiasm.\n\n§Y\"A funded raid! Excellent business. Our fleet is ready to ship out. Accept our very reasonable fee and we will show you the menu of targets.\"§!"
 gk_raiding_privateers.339.desc.automaton:0 "Fleet deployment cost analysis populates the display.\n\n§Y\"Funded raid protocol initiated. Fleet readiness: nominal. Deployment fee calculated. Confirm payment to proceed to target selection.\"§!"

 # .340 — Target Selection
 gk_raiding_privateers.340.name:0 "Select Target"
 gk_raiding_privateers.340.desc.stoic:0 "The haven's commander studies a holographic display of the local star cluster, marking potential targets with methodical precision.\n\n§Y\"Our scouts have been watching your rivals. Here are the viable targets. Pick one and our fleet launches immediately.\"§!"
 gk_raiding_privateers.340.desc.screamer:0 "The haven's commander pulls up star charts, stabbing at them with wild enthusiasm.\n\n§Y\"HYEEEIIIEEE!!!! We know your enemies! We watch them! Pick a dwamak and we GO SMASH RIGHT NOW! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.340.desc.cultist:0 "The haven's commander closes their eyes, hands hovering over a star chart as if divining the will of unseen forces.\n\n§Y\"She of the Void has shown us the movements of your enemies. Their worlds lie bare before Her sight. Name the faithless you wish brought low.\"§!"
 gk_raiding_privateers.340.desc.calculating:0 "The haven's commander displays a tactical overlay with threat assessments for each potential target.\n\n§Y\"Target analysis complete. Viable objectives identified among your declared rivals. Each assessed for fleet response time, orbital defenses, and projected extraction yield. Select your target.\"§!"
 gk_raiding_privateers.340.desc.merchant:0 "The haven's commander presents a selection of targets with a showman's flair.\n\n§Y\"Here is the menu! Our scouts have done their homework on your rivals. Pick a target and our crew ships out before the ink is dry.\"§!"
 gk_raiding_privateers.340.desc.automaton:0 "A target selection interface populates the display, overlaid with rival empire telemetry.\n\n§Y\"Rival empire scan complete. Viable targets listed below with projected engagement parameters. Select target for fleet deployment.\"§!"

 # .340 options
 gk_raiding_privateers.340.a:0 "Raid the [event_target:gk_commission_target_1.GetName]."
 gk_raiding_privateers.340.b:0 "Raid the [event_target:gk_commission_target_2.GetName]."
 gk_raiding_privateers.340.c:0 "Raid the [event_target:gk_commission_target_3.GetName]."
 gk_raiding_privateers.340.patron:0 "Raid the [event_target:gk_privateer_patron.GetName]."
 gk_raiding_privateers.340.no_fleet:0 "Fund a Raid"
 gk_raiding_privateers.340.no_targets:0 "Fund a Raid"

 # .340 tooltips
 gk_privateer_tt_commission_patron:0 "The enclave will not raid its patron."
 gk_privateer_tt_commission_no_fleet_340:0 "No raid fleet is currently available."
 gk_privateer_tt_no_valid_targets:0 "No valid rival targets found."

 # .342 — Confirmation
 gk_raiding_privateers.342.name:0 "Raid Funded"
 gk_raiding_privateers.342.desc.stoic:0 "A sharp nod from the haven's commander as the order is confirmed.\n\n§Y\"Target locked. Fleet is away. They will arrive in hostile space shortly and begin operations. We will notify you when the raid concludes. Was there anything else?\"§!"
 gk_raiding_privateers.342.desc.screamer:0 "The haven erupts in a frenzy of activity as crews scramble to their ships.\n\n§Y\"HYEEEIIIEEE!!!! FLEET AWAY! FLEET AWAY! They go SMASH the dwamaks SO HARD! You wait, boss! We bring back SO MUCH STUFF! HYEEEIIIEEE!!!! You want anything else while we wait?!\"§!"
 gk_raiding_privateers.342.desc.cultist:0 "The haven's commander intones a blessing as the fleet departs in solemn formation.\n\n§Y\"It is done. She of the Void guides their course. The faithless will know Her wrath before long. We shall send word when the harvest is complete. Is there anything else you require, patron?\"§!"
 gk_raiding_privateers.342.desc.calculating:0 "The haven's commander updates the operational display as the fleet exits the station.\n\n§Y\"Fleet dispatched. Estimated arrival at target: within standard transit window. Engagement parameters locked. You will receive an after-action report upon completion. Do you have additional directives?\"§!"
 gk_raiding_privateers.342.desc.merchant:0 "The haven's commander beams as cargo bay doors open and the raid fleet launches.\n\n§Y\"And they're off! Excellent decision, friend. Our best crew is on the job. You'll get a full report when they return with the goods. In the meantime, care to browse our other services?\"§!"
 gk_raiding_privateers.342.desc.automaton:0 "Fleet deployment status updates scroll across the display in real time.\n\n§Y\"Fleet deployed. Course locked. Target engagement imminent. Raid completion report will be transmitted upon fleet return. Query: additional directives pending?\"§!"

 # Events — Station Destroyed (600–603)
 gk_raiding_privateers.601.name:0 "Privateer Haven Destroyed"
 gk_raiding_privateers.601.desc:0 "We have received word that the [event_target:gk_privateer_enclave_country.GetName], our privateer enclave in the [event_target:gk_privateer_enclave_system.GetName] system, has been destroyed. The station was overwhelmed and all hands are presumed lost.\n\nOur dividend arrangement with the enclave has been terminated. Any ongoing raids have been disrupted."
 gk_raiding_privateers.602.name:0 "Privateer Haven Destroyed"
 gk_raiding_privateers.602.desc:0 "Our forces have destroyed the [event_target:gk_privateer_enclave_country.GetName], a privateer outpost operating in the [event_target:gk_privateer_enclave_system.GetName] system. Salvage teams have recovered usable materials from the wreckage."
 gk_raiding_privateers.603.name:0 "Privateer Haven Destroyed"
 gk_raiding_privateers.603.desc:0 "Reports indicate that the [event_target:gk_privateer_enclave_country.GetName], a privateer enclave based in the [event_target:gk_privateer_enclave_system.GetName] system, has been destroyed."

 # Events — Patron Change (610–612)
 gk_raiding_privateers.611.name:0 "Privateer Patronage Lost"
 gk_raiding_privateers.611.desc:0 "The [event_target:gk_privateer_enclave_country.GetName] in the [event_target:gk_privateer_enclave_system.GetName] system is no longer under our patronage. Control of the system has changed hands, and the enclave now answers to whoever holds that space.\n\nOur dividend arrangement has ended."
 gk_raiding_privateers.612.name:0 "Privateer Enclave Acquired"
 gk_raiding_privateers.612.desc:0 "A privateer enclave, the [event_target:gk_privateer_enclave_country.GetName], operates in the [event_target:gk_privateer_enclave_system.GetName] system, which is now under our control. As the new patron of this enclave, we will receive periodic dividends from their raiding operations.\n\nThe enclave's diplomatic channel is now open to us."

 # Events — Raid Failed (217)
 gk_raiding_privateers.217.name:0 "Raid Fleet Lost"
 gk_raiding_privateers.217.desc:0 "The [event_target:gk_privateer_enclave_country.GetName] reports that their raid fleet has been destroyed in hostile space. The crew and cargo are lost. The enclave will need time to recover before launching further operations."

