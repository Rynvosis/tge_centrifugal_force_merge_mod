 # ──────────────────────────────────────────────────────────────────
 # Dividend Events (500–530)
 # ──────────────────────────────────────────────────────────────────

 # .510 — Scrapped Goods
 gk_raiding_privateers.510.name:0 "Scrapped Goods"
 gk_raiding_privateers.510.desc.stoic:0 "A transmission from the [event_target:gk_privateer_enclave_country.GetName]. Brief and to the point, as always. Attached is a cargo manifest.\n\n§Y\"Patron. We have broken down several captured vessels and stripped a convoy. The salvage has been processed. Forwarding your share of the alloys and manufactured goods. Our holds grow heavy with purpose.\"§!"
 gk_raiding_privateers.510.desc.screamer:0 "An explosion of noise over the comms. The [event_target:gk_privateer_enclave_country.GetName] is celebrating again.\n\n§Y\"HYEEEIIIEEE!!!! We smash many ships! Rip apart! Take the shiny bits! Very good metal inside dwamak ships, you know? We melt down, make pretty for you! TAKE TAKE TAKE! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.510.desc.cultist:0 "A solemn transmission from the [event_target:gk_privateer_enclave_country.GetName]. The background hum of devotional chanting underscores every word.\n\n§Y\"She of the Void has guided our hands in the dismantling of the unworthy. Their vessels have been rendered unto their base components, offerings transmuted into tools for Her faithful. Accept these gifts, patron, and know they are consecrated.\"§!"
 gk_raiding_privateers.510.desc.calculating:0 "A data packet from the [event_target:gk_privateer_enclave_country.GetName], accompanied by a detailed breakdown of salvage operations.\n\n§Y\"Salvage report: 14 vessel hulls processed, 3 convoy interdictions completed. Yield analysis indicates optimal strip efficiency at 94.2%. Alloy and consumer goods allocation attached. Recommend reinvestment in fleet maintenance for maximum returns.\"§!"
 gk_raiding_privateers.510.desc.merchant:0 "A cheerful hail from the [event_target:gk_privateer_enclave_country.GetName]. Their leader is practically beaming through the viewscreen.\n\n§Y\"Good news, friend! Business has been excellent this quarter. We've scrapped quite a haul, top quality alloys and manufactured goods, barely singed! Your cut is on its way. A pleasure doing business, as always!\"§!"
 gk_raiding_privateers.510.desc.automaton:0 "An automated report from the [event_target:gk_privateer_enclave_country.GetName]. No preamble, just structured data.\n\n§Y\"Salvage cycle complete. Captured vessel hulls have been disassembled and processed. Alloy and consumer goods yield extracted at optimal efficiency. Command authority share calculated and dispatched. End of report.\"§!"

 # .515 — Intercepted Cargo
 gk_raiding_privateers.515.name:0 "Intercepted Cargo"
 gk_raiding_privateers.515.desc.stoic:0 "A secure transmission from the [event_target:gk_privateer_enclave_country.GetName]. A cargo manifest scrolls alongside the feed.\n\n§Y\"Patron. We intercepted a trade convoy transiting through neutral space. Cargo secured without incident. Forwarding your share: processed alloys and the liquid credits we extracted from their holds. Clean operation.\"§!"
 gk_raiding_privateers.515.desc.screamer:0 "Frenzied whooping erupts from the comms as the [event_target:gk_privateer_enclave_country.GetName] checks in.\n\n§Y\"HYEEEIIIEEE!!!! Dwamak traders try to sneak past! We say NO SNEAKING! Jump out, grab everything, zoom away! They cry and cry! So many shinies! So many credits! ALL FOR US! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.515.desc.cultist:0 "A ritualistic transmission from the [event_target:gk_privateer_enclave_country.GetName]. Incense smoke drifts across the viewscreen.\n\n§Y\"The Void whispered of a convoy straying too close to Her domain. We answered Her call. The cargo was claimed in Her name, and the crews were set adrift as witnesses to Her reach. Your tithe of alloys and credits awaits, patron.\"§!"
 gk_raiding_privateers.515.desc.calculating:0 "An encrypted data burst from the [event_target:gk_privateer_enclave_country.GetName], timestamped to the second.\n\n§Y\"Interdiction report: trade convoy intercepted at predicted coordinates. Cargo transfer completed in 4 minutes 12 seconds, within acceptable parameters. Resource analysis: alloy components and liquid capital secured. Allocating patron share per standard distribution model.\"§!"
 gk_raiding_privateers.515.desc.merchant:0 "A warm transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their leader raises a glass.\n\n§Y\"Wonderful news! We happened upon a rather fat trade convoy, and well, one thing led to another. Don't worry, no one was hurt! Much. Your share of the alloys and credits is en route. Let's call it a redistribution of wealth, shall we?\"§!"
 gk_raiding_privateers.515.desc.automaton:0 "A flagged interdiction log from the [event_target:gk_privateer_enclave_country.GetName].\n\n§Y\"Interdiction report: trade convoy intercepted along predicted transit corridor. Cargo transfer executed within mission parameters. Alloy components and liquid capital secured. Command authority allocation dispatched. End of report.\"§!"

 # .520 — Plundered Cargo
 gk_raiding_privateers.520.name:0 "Plundered Cargo"
 gk_raiding_privateers.520.desc.stoic:0 "A terse transmission from the [event_target:gk_privateer_enclave_country.GetName]. The cargo manifest contains unusual entries.\n\n§Y\"Patron. We hit a research transport carrying strategic materials. Rare goods, carefully handled. Your share includes processed alloys and a quantity of refined strategic resources. Use them well.\"§!"
 gk_raiding_privateers.520.desc.screamer:0 "Ecstatic shrieking fills the channel as the [event_target:gk_privateer_enclave_country.GetName] reports in.\n\n§Y\"HYEEEIIIEEE!!!! You never guess what we find! Special sparkly stuff! Very rare! Very shiny! We almost keep for ourselves but NO, good privateers share with boss! Shiny rocks AND metal bits! BEST DAY! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.520.desc.cultist:0 "An awed transmission from the [event_target:gk_privateer_enclave_country.GetName]. The speaker's voice trembles with reverence.\n\n§Y\"She of the Void has blessed us with a sign. Among the plundered cargo, rare materials, crystallized essences of the cosmos itself. We have purified them according to Her rites. Accept these sacred resources, patron. They carry Her favor.\"§!"
 gk_raiding_privateers.520.desc.calculating:0 "A priority data packet from the [event_target:gk_privateer_enclave_country.GetName], flagged with resource markers.\n\n§Y\"Priority acquisition report: secured shipment containing strategic-grade materials. Probability of this interception was calculated at 12.3%, making this an above-average outcome. Alloy and strategic resource allocation forwarded. Recommend strategic reserve allocation.\"§!"
 gk_raiding_privateers.520.desc.merchant:0 "An excited transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their leader can barely contain themselves.\n\n§Y\"Jackpot, friend! Absolute jackpot! We intercepted a shipment of strategic materials along with the usual haul. Do you know what these go for on the open market? Well, you won't need to find out, because your share is already boxed and ready. What a score!\"§!"
 gk_raiding_privateers.520.desc.automaton:0 "A priority-flagged acquisition log from the [event_target:gk_privateer_enclave_country.GetName].\n\n§Y\"Priority acquisition report: shipment containing strategic-grade materials secured during routine interdiction operations. Resource classification: rare. Alloy and strategic resource allocation forwarded to command authority. End of report.\"§!"

 # .530 — Scavenged Fleet
 gk_raiding_privateers.530.name:0 "Scavenged Fleet"
 gk_raiding_privateers.530.desc.stoic:0 "An unusual transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their leader appears on screen with something approaching satisfaction.\n\n§Y\"Patron. We captured several vessels intact during recent operations. They have been repaired, rearmed, and crewed. Rather than scrap them, we are transferring them to your command. Consider it a demonstration of our capabilities. They will serve you well.\"§!"
 gk_raiding_privateers.530.desc.screamer:0 "A deafening roar of celebration erupts from the [event_target:gk_privateer_enclave_country.GetName]. Their leader is practically dancing.\n\n§Y\"HYEEEIIIEEE!!!! BEST PRESENT! We catch whole ships! Not broken, not smashed, WHOLE SHIPS! We fix up, put our crew in, now they yours! You fly them, smash more dwamaks! EVERYBODY WINS! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.530.desc.cultist:0 "A reverent transmission from the [event_target:gk_privateer_enclave_country.GetName]. Sacred chanting swells in the background.\n\n§Y\"She of the Void has delivered unto us vessels whole and unbroken. A miracle, patron. We have blessed their hulls and dedicated their crews to Her service. Accept this fleet as Her gift, instruments of Her will given form and purpose.\"§!"
 gk_raiding_privateers.530.desc.calculating:0 "A detailed transmission from the [event_target:gk_privateer_enclave_country.GetName], accompanied by full technical readouts.\n\n§Y\"Asset transfer notification: multiple combat-capable vessels acquired through precision boarding operations. All systems restored to 97.8% operational capacity. Cost-benefit analysis favors transfer over salvage by a factor of 3.2. Fleet is en route to your capital. Crew complements are at standard levels.\"§!"
 gk_raiding_privateers.530.desc.merchant:0 "A beaming transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their leader looks like they just closed the deal of a lifetime.\n\n§Y\"Friend, have I got a surprise for you! We managed to acquire some ships in, shall we say, lightly used condition. Rather than breaking them down, we thought, why not give them to our favorite patron? A fleet, courtesy of the [event_target:gk_privateer_enclave_country.GetName]. Consider it an investment in our partnership!\"§!"
 gk_raiding_privateers.530.desc.automaton:0 "An asset transfer notification from the [event_target:gk_privateer_enclave_country.GetName].\n\n§Y\"Asset transfer report: multiple combat-capable vessels captured intact during boarding operations. All systems restored to operational capacity. Analysis indicates transfer to command authority yields superior strategic value over salvage. Fleet is en route. End of report.\"§!"
 gk_raiding_privateers.530.a:0 "Accept the fleet."
 gk_raiding_privateers.530.b:0 "Have them scrapped for §Yalloys§! instead."

 # .525 — Exotic Specimens
 gk_raiding_privateers.525.name:0 "Exotic Specimens"
 gk_raiding_privateers.525.desc.stoic:0 "A transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their leader holds up a sealed container, its contents faintly luminous.\n\n§Y\"Patron. We intercepted a collector's shipment transiting through unpatrolled space. Rare specimens, alien curiosities, the sort of things that fetch a fortune on the right markets. We have set aside the most interesting pieces for your archives. Do with them as you see fit.\"§!"
 gk_raiding_privateers.525.desc.screamer:0 "Excited chittering floods the comms as the [event_target:gk_privateer_enclave_country.GetName] reports in.\n\n§Y\"HYEEEIIIEEE!!!! You see what we find?! Pretty pretty things! Shiny rocks! Weird alien doohickeys! One of them GLOWS! We want to keep but no, good privateers share the best stuff with boss! Take take take! Put in your fancy display case! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.525.desc.cultist:0 "A hushed, reverent transmission from the [event_target:gk_privateer_enclave_country.GetName]. The speaker cradles a wrapped object like a holy relic.\n\n§Y\"She of the Void has revealed hidden treasures to us, patron. Among the plundered cargo were artifacts of singular beauty and mystery. Relics that hum with the resonance of distant worlds. We have cleansed them of profane ownership. Accept these offerings for your grand collection.\"§!"
 gk_raiding_privateers.525.desc.calculating:0 "A catalogued data burst from the [event_target:gk_privateer_enclave_country.GetName], cross-referenced with known specimen databases.\n\n§Y\"Specimen acquisition report: intercepted shipment containing items of scientific and cultural significance. Preliminary classification complete. Estimated archival value exceeds standard cargo yield by factor 2.7. Specimens packaged for secure transfer. Recommend immediate integration into collection infrastructure.\"§!"
 gk_raiding_privateers.525.desc.merchant:0 "A delighted transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their leader is practically vibrating with excitement.\n\n§Y\"Oh, you are going to love this one, friend! We hit a collector's transport and the hold was full of rare specimens! Alien curios, geological wonders, the works! I was tempted to auction them off myself, but a deal is a deal. Your cut is the cream of the crop. Enjoy!\"§!"
 gk_raiding_privateers.525.desc.automaton:0 "A specimen transfer manifest from the [event_target:gk_privateer_enclave_country.GetName].\n\n§Y\"Acquisition report: intercepted cargo vessel carrying specimens of scientific and cultural value. Items catalogued, classified, and packaged for transfer to command authority collection. Estimated research and cultural utility: significant. End of report.\"§!"

 gk_raiding_privateers.525.a:0 "Take the centerpiece."
 gk_raiding_privateers.525.b:0 "Take your share."
 GK_PRIVATEER_SPECIMEN_ORIGIN: "Privateer Plunder"

 # ──────────────────────────────────────────────────────────────────
 # Autonomous Raiding Events (210–230, 400–402)
 # ──────────────────────────────────────────────────────────────────

 # .400 — Tribute Demand
 gk_raiding_privateers.400.name:0 "Privateer Ultimatum"
 gk_raiding_privateers.400.desc.stoic:0 "An encrypted transmission cuts through standard comms. A scarred face regards us with cold appraisal.\n\n§Y\"[Root.GetSpeciesNamePlural]. Your worlds have caught our attention. We can do this the easy way or the hard way. Transfer a tribute payment and we move on. Refuse, and our fleet will extract what we are owed. The choice is yours.\"§!"
 gk_raiding_privateers.400.desc.screamer:0 "Our comms array nearly overloads with the volume of the incoming signal. A wild-eyed figure is shrieking into the pickup.\n\n§Y\"HYEEEIIIEEE!!!! Stupid [Root.GetSpeciesNamePlural]! We see your pretty worlds! So many shinies! You give us credits NOW or we come take EVERYTHING! We very good at taking! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.400.desc.cultist:0 "A low, resonant chanting precedes the visual feed. A robed figure materializes from shadow, eyes burning with conviction.\n\n§Y\"She of the Void has marked the worlds of the [Root.GetSpeciesNamePlural] for harvest. There is no escaping Her gaze. You may offer tribute willingly and be spared Her wrath, or you may resist and learn the true meaning of devotion. Choose.\"§!"
 gk_raiding_privateers.400.desc.calculating:0 "A precisely formatted data packet arrives on a tight-beam frequency. A composed figure studies readouts as they speak.\n\n§Y\"Analysis complete. [Root.GetSpeciesName] defensive capabilities have been assessed. Projected extraction yield: significant. Proposal: transfer energy credits as tribute. Alternative: forced extraction at reduced efficiency for you, optimal efficiency for us. Response requested within standard cycle.\"§!"
 gk_raiding_privateers.400.desc.merchant:0 "A cheerful hail arrives on an open frequency. A grinning figure raises a drink in mock greeting.\n\n§Y\"Well hello there, [Root.GetSpeciesName] friend! I have a business proposition for you. See, my crews are getting restless, and they have their eyes on your lovely colonies. Now, we can settle this like civilized beings, a small tribute and we part ways. Or we can settle it the other way. Your call!\"§!"
 gk_raiding_privateers.400.desc.automaton:0 "A machine-precise transmission arrives without preamble. A tactical overlay of our systems fills the display.\n\n§Y\"ALERT: Extraction fleet allocated. Target: [Root.GetSpeciesName] territorial holdings. Optimal resolution: tribute transfer. Suboptimal resolution: forced resource extraction with collateral projections. Input required: compliance or resistance. Standing by.\"§!"
 gk_raiding_privateers.400.a:0 "Offer Tribute §Y(Energy Credits)§!"
 gk_raiding_privateers.400.b:0 "You'll get nothing from us."
 gk_raiding_privateers.400.a.response:0 "Your tribute has been noted. Our fleet will stand down. Consider this a lesson in pragmatism."
 gk_raiding_privateers.400.b.response:0 "Then we shall take by force what you should have offered in tribute. You have made a terrible mistake this day."

 # .221 — Raid Complete (patron popup)
 gk_raiding_privateers.221.name:0 "Privateer Raid Complete"
 gk_raiding_privateers.221.desc.stoic:0 "A transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their commander delivers the report with characteristic brevity.\n\n§Y\"Raid concluded. The fleet has returned with plunder. Your share has been processed and transferred. Details attached.\"§!"
 gk_raiding_privateers.221.desc.screamer:0 "Deafening celebration erupts from the [event_target:gk_privateer_enclave_country.GetName]. The commander can barely be heard over the revelry.\n\n§Y\"HYEEEIIIEEE!!!! WE BACK! WE BACK WITH SO MUCH STUFF! Dwamak worlds burn good! Your share, boss! TAKE TAKE TAKE! HYEEEIIIEEE!!!!\"§!"
 gk_raiding_privateers.221.desc.cultist:0 "A reverent transmission from the [event_target:gk_privateer_enclave_country.GetName]. Sacred chanting underscores every word.\n\n§Y\"She of the Void guided our blades true. The harvest is complete. We have offered a portion unto Her altar and return the rest to you, patron. May these spoils serve Her greater purpose.\"§!"
 gk_raiding_privateers.221.desc.calculating:0 "A detailed after-action report from the [event_target:gk_privateer_enclave_country.GetName].\n\n§Y\"Raid operation complete. All objectives met within projected parameters. Resource extraction summary attached. Patron allocation calculated per standard distribution model. Recommend strategic reserve allocation.\"§!"
 gk_raiding_privateers.221.desc.merchant:0 "A beaming transmission from the [event_target:gk_privateer_enclave_country.GetName]. Their commander raises a glass.\n\n§Y\"Excellent news, friend! The raid was a smashing success. Our crews are celebrating, and your cut is already boxed and ready. What a haul! Business is booming at the [event_target:gk_privateer_enclave_country.GetName]!\"§!"
 gk_raiding_privateers.221.desc.automaton:0 "An automated after-action report from the [event_target:gk_privateer_enclave_country.GetName].\n\n§Y\"Raid operation complete. Resource extraction within projected yield. Fleet returned to station. All combat platforms nominal. Command authority allocation dispatched. End of report.\"§!"

 # .402 — Raiders Withdrew
 gk_raiding_privateers.402.name:0 "Raiders Withdraw"
 gk_raiding_privateers.402.desc:0 "The heavy losses inflicted upon the [From.GetSpeciesName] raiding fleet have been enough to discourage further attacks. Their remaining ships have withdrawn from our space, though the devastation left in their wake will take time to repair."

