l_english:
 gk_ec_titanic_system_init_NAME: "GK Titanic Homeworld"
 gk_ec_titanic_system_init_DESC: "An oversized, resource-rich homeworld in a system of unusually massive celestial bodies.\n\n§YNo Guaranteed Habitable Worlds.§!\n\n§RIncompatible with Doomsday and Life-Seeded. Taking this with either will destroy your colony at game start.§!\n\n$system_initializer_DESC$"
 gk_ec_lunar_colony_system_init_NAME: "GK Lunar Colony"
 gk_ec_lunar_colony_system_init_DESC: "A modest capital world with a small, habitable moon already settled as your first colony. Both worlds grow larger with each guaranteed colony traded away.\n\n§YNo Guaranteed Habitable Worlds.§!\n\n§RIncompatible with Doomsday and Life-Seeded. Taking this with either will destroy both colonies at game start.§!\n\n$system_initializer_DESC$"
 gk_ec_ruined_habitat_system_init_NAME: "GK Ruined Habitat"
 gk_ec_ruined_habitat_system_init_DESC: "A trinary star system with the remnants of a prior civilization. A ruined habitat orbits the primary star, and habitat technology is available for research from the start.\n\n§YNo Guaranteed Habitable Worlds.§!\n\n§RIncompatible with Doomsday and Life-Seeded. Taking this with either will destroy your colony at game start.§!\n\n$system_initializer_DESC$"

 # Lunar Colony Events
 gk_ec_lunar_colony.3.title: "The Lunar Settlement"
 gk_ec_lunar_colony.3.desc: "Our colonists have established a foothold on the moon orbiting [Root.Capital.GetName]. The settlement is small but viable. How shall we direct its development?"

 gk_ec_lunar_colony.3.mining: "Mining Colony"
 gk_ec_lunar_colony.3.mining.icon: "Focus on resource extraction"
 gk_ec_lunar_colony.3.industrial: "Industrial Colony"
 gk_ec_lunar_colony.3.industrial.icon: "Develop manufacturing infrastructure"
 gk_ec_lunar_colony.3.trade: "Trade Hub"
 gk_ec_lunar_colony.3.trade.icon: "Establish commercial operations"
 gk_ec_lunar_colony.3.fortress: "Fortress World"
 gk_ec_lunar_colony.3.fortress.icon: "Establish military fortifications"
 gk_ec_lunar_colony.3.archive: "Archive World"
 gk_ec_lunar_colony.3.archive.icon: "Build research archives"
 gk_ec_lunar_colony.3.science: "Science World"
 gk_ec_lunar_colony.3.science.icon: "Relocate experimentation facilities"
 gk_ec_lunar_colony.3.resort: "Resort World"
 gk_ec_lunar_colony.3.resort.icon: "Develop leisure facilities"

 gk_ec_lunar_colony.4.title: "Lunar Penal Designation"
 gk_ec_lunar_colony.4.desc: "With our colony established on the moon, we could designate it as a penal facility. Criminals and dissidents would be relocated there to serve out their sentences productively."
 gk_ec_lunar_colony.4.desc.experimenters: "With our colony established on the moon, we could designate it as a penal facility. Our researchers are particularly eager. They assure us the remote location would be ideal for their more... ambitious experiments. Oversight would be minimal. Results would be maximized."
 gk_ec_lunar_colony.4.yes: "Designate as Penal Colony"
 gk_ec_lunar_colony.4.yes.icon: "Penal colony designation"
 gk_ec_lunar_colony.4.no: "No, keep it as is"

 gk_ec_system_initializer.5.title: "Catastrophic Miscalculation"
 gk_ec_system_initializer.5.desc: "In what can only be described as a colossal failure of planning, we selected a start system that is fundamentally incompatible with our origin. Everything has been obliterated.\n\nWe did warn you."
 gk_ec_system_initializer.5.ok: "We deserve this."
