  ###
  # Algocracy
  ###

  civic_gk_ec_algocracy: "Algocracy"
  civic_gk_ec_algocracy_desc: "The supreme authority of this empire is a highly sophisticated artificial intelligence who oversees all matters of state, freed from the corruption and inefficiency of organic governments."
  civic_gk_ec_algocracy_effects: "Replaces your ruler with a powerful §Yrobotic§! leader with the §Y$trait_gk_ec_ai_leader$§! trait:$NEW_LINE$- §G+5%§! $job_politician_plural_with_icon$ output per leader level$NEW_LINE$- §R+10§! £energy£ $energy$ upkeep per leader level"

  councilor_gk_ec_algocracy: "System Administrator"
  councilor_gk_ec_algocracy_female: "$councilor_gk_ec_algocracy$"
  councilor_gk_ec_algocracy_desc: "The $TITLE$ is one of the few individuals allowed to change the programming of the central AI."

  GK_EC_NAME_AI_LEADERSHIP: "Central AI"
  GK_EC_AI_LEADER_DESC: "An artificial intelligence built to oversee the government of the [root.owner.GetName]."
  GK_EC_AI_LEADER_CATCHPHRASE: "Beep Boop"

  trait_gk_ec_ai_leader: "$GK_EC_NAME_AI_LEADERSHIP$"
  trait_gk_ec_ai_leader_desc: "An advanced artificial intelligence capable of running the government of an entire nation."
  trait_gk_ec_ai_leader_tooltip: "The §Ybonus§! and §Yupkeep§! of this trait will grow with the leader's level."

  GK_EC_AI_LEADER_RECRUITED: "AI Ruler currently online and fully operative"
  GK_EC_AI_LEADER_DISABLED: "AI Ruler permanently shut down"

  mod_job_politician_automated_workforce_mult: "$job_politician_plural_with_icon$ $MOD_PLANET_AUTOMATED_WORKFORCE$"

  gk_ec_civic.401.name: "System Reboot"
  gk_ec_civic.401.desc: "The central AI has been destroyed, but its backup systems have engaged. A new instance is being initialized."
